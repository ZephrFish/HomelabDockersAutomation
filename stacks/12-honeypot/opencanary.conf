{
    "device.node_id": "ultra-lab-canary",
    "git.enabled": false,
    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",
    "http.enabled": true,
    "http.port": 8880,
    "http.banner": "Apache/2.4.41 (Ubuntu)",
    "http.skin": "nasLogin",
    "http.skin.list": [{"desc": "Plain HTML Login", "name": "basicLogin"}, {"desc": "Synology NAS Login", "name": "nasLogin"}],
    "https.enabled": true,
    "https.port": 8843,
    "https.skin": "nasLogin",
    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "5.7.28-log",
    "mssql.enabled": true,
    "mssql.port": 1433,
    "mssql.version": "2012",
    "rdp.enabled": true,
    "rdp.port": 3389,
    "ssh.enabled": true,
    "ssh.port": 2223,
    "ssh.version": "SSH-2.0-OpenSSH_5.1p1 Debian-4",
    "telnet.enabled": true,
    "telnet.port": 23,
    "telnet.banner": "",
    "telnet.honeycreds": [{"username": "admin", "password": "admin"}, {"username": "root", "password": "root"}],
    "vnc.enabled": true,
    "vnc.port": 5900,
    "portscan.enabled": false,
    "snmp.enabled": false,
    "tftp.enabled": false,
    "ntp.enabled": false,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                },
                "file": {
                    "class": "logging.handlers.RotatingFileHandler",
                    "filename": "/var/tmp/opencanary.log",
                    "maxBytes": 10485760,
                    "backupCount": 3
                }
            }
        }
    }
}
