server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: journal
    journal:
      max_age: 12h
      path: /run/log/journal
      labels:
        job: systemd-journal
        host: ultra-lab
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal__hostname']
        target_label: hostname
      - source_labels: ['__journal_priority_keyword']
        target_label: level

  - job_name: vzdump
    static_configs:
      - targets: [localhost]
        labels:
          job: vzdump
          host: ultra-lab
          __path__: /var/log/vzdump-cron.log

  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: ultra-lab
          __path__: /var/log/syslog

  - job_name: opencanary
    static_configs:
      - targets: [localhost]
        labels:
          job: opencanary
          host: ultra-lab
          __path__: /opencanary/opencanary.log
    pipeline_stages:
      - json:
          expressions:
            logtype: logtype
            src_host: src_host
            dst_port: dst_port
            node_id: node_id
      - labels:
          logtype:
          src_host:
          dst_port:
          node_id:
